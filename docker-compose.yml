version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: elangode_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elangode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elangode_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/elangode
      - JWT_SECRET=super-secret-key-change-in-production-1234567890
      - ADMIN_EMAIL=admin@elangode.com
      - ADMIN_PASSWORD=Admin123!
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elangode_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
