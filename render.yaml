services:
  - type: db
    name: elangode-db
    postgresMajorVersion: 15
    ipAllowList: []

  - type: web
    name: elangode-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromService:
          type: db
          name: elangode-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@elangode.com
      - key: ADMIN_PASSWORD
        value: Admin123!
