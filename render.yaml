services:
  - type: web
    name: elangode-backend
    plan: free  # Forces Render to use the free tier
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@elangode.com
      - key: ADMIN_PASSWORD
        value: Admin123!
