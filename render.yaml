services:
  - type: web
    name: elangode-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Render will prompt you to paste your Supabase connection string during deploy
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@elangode.com
      - key: ADMIN_PASSWORD
        value: Admin123!
