databases:
  - name: elangode-db
    databaseName: elangode
    user: postgres

services:
  - type: web
    name: elangode-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elangode-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@elangode.com
      - key: ADMIN_PASSWORD
        value: Admin123!
